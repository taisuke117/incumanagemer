<title>細胞パッセージ管理 — Cell Passage Timeline</title>
<style>
  :root{
    --bg:#eef1f5; --surface:#ffffff; --surface-2:#f2f5f9; --surface-3:#e8edf3;
    --border:#d7dee7; --border-strong:#c2ccd8;
    --ink:#1a2029; --ink-soft:#5a6675; --ink-faint:#8b97a6;
    --accent:#e0397a; --accent-ink:#fff; --accent-soft:#fce1ec;
    --weekend:rgba(120,135,155,.07); --today:#e0397a;
    --f-passage:#e0397a; --f-passage-bg:#fce0ec;
    --f-freeze:#1f9fc0;  --f-freeze-bg:#dcf1f6;
    --f-isogen:#7a58d6;  --f-isogen-bg:#e9e2f9;
    --f-other:#c9821c;   --f-other-bg:#f8ecd6;
    --shadow:0 1px 2px rgba(20,30,45,.06),0 6px 20px rgba(20,30,45,.07);
    --mono:ui-monospace,"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0e1218; --surface:#161d27; --surface-2:#1b232f; --surface-3:#222c3a;
      --border:#2a3543; --border-strong:#374556;
      --ink:#e6ecf3; --ink-soft:#98a5b5; --ink-faint:#697687;
      --accent:#ff5c97; --accent-ink:#1a0510; --accent-soft:#3a1526;
      --weekend:rgba(150,170,195,.05); --today:#ff5c97;
      --f-passage:#ff5c97; --f-passage-bg:#3a1526;
      --f-freeze:#3cc3e0;  --f-freeze-bg:#12303a;
      --f-isogen:#a488f5;  --f-isogen-bg:#241a3d;
      --f-other:#e6a545;   --f-other-bg:#352913;
      --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 26px rgba(0,0,0,.45);
    }
  }
  :root[data-theme="light"]{
    --bg:#eef1f5; --surface:#ffffff; --surface-2:#f2f5f9; --surface-3:#e8edf3;
    --border:#d7dee7; --border-strong:#c2ccd8;
    --ink:#1a2029; --ink-soft:#5a6675; --ink-faint:#8b97a6;
    --accent:#e0397a; --accent-ink:#fff; --accent-soft:#fce1ec;
    --weekend:rgba(120,135,155,.07); --today:#e0397a;
    --f-passage:#e0397a; --f-passage-bg:#fce0ec;
    --f-freeze:#1f9fc0;  --f-freeze-bg:#dcf1f6;
    --f-isogen:#7a58d6;  --f-isogen-bg:#e9e2f9;
    --f-other:#c9821c;   --f-other-bg:#f8ecd6;
    --shadow:0 1px 2px rgba(20,30,45,.06),0 6px 20px rgba(20,30,45,.07);
  }
  :root[data-theme="dark"]{
    --bg:#0e1218; --surface:#161d27; --surface-2:#1b232f; --surface-3:#222c3a;
    --border:#2a3543; --border-strong:#374556;
    --ink:#e6ecf3; --ink-soft:#98a5b5; --ink-faint:#697687;
    --accent:#ff5c97; --accent-ink:#1a0510; --accent-soft:#3a1526;
    --weekend:rgba(150,170,195,.05); --today:#ff5c97;
    --f-passage:#ff5c97; --f-passage-bg:#3a1526;
    --f-freeze:#3cc3e0;  --f-freeze-bg:#12303a;
    --f-isogen:#a488f5;  --f-isogen-bg:#241a3d;
    --f-other:#e6a545;   --f-other-bg:#352913;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 26px rgba(0,0,0,.45);
  }

  *{box-sizing:border-box}
  body,.wrap{background:var(--bg);color:var(--ink);font-family:var(--sans)}
  .wrap{max-width:1240px;margin:0 auto;padding:22px 20px 60px;-webkit-font-smoothing:antialiased}

  .top{display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px 20px;margin-bottom:16px}
  .title h1{font-size:22px;font-weight:680;letter-spacing:-.01em;margin:0;line-height:1.15}
  .title .sub{color:var(--ink-soft);font-size:12.5px;margin-top:3px;letter-spacing:.01em}
  .title .sub b{color:var(--accent);font-weight:600}
  .spacer{flex:1 1 auto}

  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .btn{font-family:var(--sans);font-size:13px;font-weight:560;color:var(--ink);
    background:var(--surface);border:1px solid var(--border-strong);border-radius:9px;
    padding:8px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;
    transition:.13s border-color,.13s background,.13s transform}
  .btn:hover{border-color:var(--ink-faint);background:var(--surface-2)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn.primary{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  .btn.primary:hover{filter:brightness(1.05);background:var(--accent)}
  .btn.ghost{background:transparent;border-color:var(--border)}
  .btn svg{width:15px;height:15px;display:block}
  .zoom{display:inline-flex;border:1px solid var(--border-strong);border-radius:9px;overflow:hidden;background:var(--surface)}
  .zoom button{border:0;background:transparent;color:var(--ink);width:34px;height:34px;cursor:pointer;font-size:16px;line-height:1}
  .zoom button:hover{background:var(--surface-2)}
  .zoom span{display:inline-flex;align-items:center;padding:0 10px;font-size:11.5px;color:var(--ink-soft);border-left:1px solid var(--border);border-right:1px solid var(--border);font-variant-numeric:tabular-nums}
  .fstat{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);padding:0 4px;white-space:nowrap;max-width:230px;overflow:hidden;text-overflow:ellipsis}
  .fstat.act{color:var(--ink)}
  .fstat b{color:var(--accent);font-weight:600}
  .fstat .sub{color:var(--ink-faint)}
  .dotst{width:8px;height:8px;border-radius:50%;flex:none;background:var(--ink-faint)}
  .dotst.ok{background:#2fa46b}
  .dotst.warn{background:#c9821c}
  .dotst.err{background:#d5405a}
  .tbsep{width:1px;height:22px;background:var(--border);margin:0 1px}

  .legend{display:flex;flex-wrap:wrap;gap:6px 15px;align-items:center;margin:2px 0 14px;
    padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:11px}
  .legend .grp{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .legend .lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:640;margin-right:2px}
  .lg{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft)}
  .lg .sw{width:12px;height:12px;border-radius:4px}
  .lg .dish{font-family:var(--mono);font-size:10.5px;padding:1px 6px;border-radius:5px;background:var(--surface-3);border:1px solid var(--border);color:var(--ink-soft)}
  .sep{width:1px;height:20px;background:var(--border);margin:0 2px}

  .today{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .today h2{margin:0 0 11px;font-size:14px;font-weight:660;display:flex;align-items:center;gap:9px}
  .today h2 .date{font-family:var(--mono);font-size:12px;color:var(--ink-soft);font-weight:500}
  .today h2 .cnt{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--ink-faint)}
  .today .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:640px){.today .cols{grid-template-columns:1fr}}
  .tcol h3{margin:0 0 8px;font-size:11px;letter-spacing:.04em;color:var(--ink-faint);font-weight:660;display:flex;align-items:center;gap:7px}
  .tcol h3 .tg{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;color:#fff}
  .titem{display:flex;align-items:center;gap:9px;padding:8px 11px;border:1px solid var(--border);border-radius:9px;background:var(--surface-2);cursor:pointer;margin-bottom:6px;transition:.12s}
  .titem:hover{border-color:var(--ink-faint);background:var(--surface-3)}
  .titem .main{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
  .titem .r1{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .titem .r1 .p{font-family:var(--mono);color:var(--ink-soft);font-weight:600}
  .titem .r2{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums;word-break:break-word}
  .titem .dishchip{font-family:var(--mono);font-size:9.5px;padding:0 5px;border-radius:4px;border:1px solid var(--border-strong);color:var(--ink-soft);font-weight:600;background:var(--surface-3)}
  .titem .uchip{font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;color:#fff;white-space:nowrap}
  .tempty{font-size:12px;color:var(--ink-faint);padding:6px 2px}

  .board{position:relative;background:var(--surface);border:1px solid var(--border);
    border-radius:13px;overflow:auto;max-height:74vh;box-shadow:var(--shadow)}
  .grid{display:grid;grid-template-columns:var(--labelw,210px) max-content}
  .corner{position:sticky;left:0;top:0;z-index:40;background:var(--surface);
    border-right:1px solid var(--border-strong);border-bottom:1px solid var(--border-strong);
    display:flex;align-items:center;padding:0 14px;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ink-faint);font-weight:640}
  .thead{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--border-strong)}
  .labels{position:sticky;left:0;z-index:15;background:var(--surface);border-right:1px solid var(--border-strong)}
  .canvas{position:relative;z-index:1}

  .rowlab{display:flex;flex-direction:column;justify-content:center;padding:0 14px;
    border-bottom:1px solid var(--border);gap:2px}
  .rowlab.grouphdr{background:var(--surface-2);flex-direction:row;align-items:center;gap:8px}
  .rowlab .cell{font-weight:600;font-size:13px;letter-spacing:-.01em}
  .rowlab.grouphdr .cell{font-size:12.5px}
  .rowlab .meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft);display:flex;gap:6px;align-items:center;font-variant-numeric:tabular-nums}
  .rowlab .pass{color:var(--accent);font-weight:600}
  .rowlab .count{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);background:var(--surface-3);border-radius:20px;padding:1px 8px}
  .dot{width:7px;height:7px;border-radius:50%;flex:none}

  .gt{font-size:9px;font-weight:700;padding:0 5px;border-radius:4px;letter-spacing:.02em;line-height:15px;display:inline-block;white-space:nowrap}
  .gt.wt{background:var(--surface-3);color:var(--ink-soft);border:1px solid var(--border)}
  .gt.ko{background:var(--accent-soft);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 35%,transparent)}

  .bar{position:absolute;border-radius:8px;padding:5px 8px;overflow:visible;cursor:pointer;
    border:1px solid var(--barln);background:var(--barbg);color:var(--ink);
    box-shadow:0 1px 1px rgba(20,30,45,.05);transition:.12s transform,.12s box-shadow;
    display:flex;flex-direction:column;justify-content:center;gap:1px;z-index:6}
  .bar:hover{transform:translateY(-1px);box-shadow:var(--shadow);z-index:9}
  .bar:focus-visible{outline:2px solid var(--ink);outline-offset:1px}
  .bar .capln{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--barcap);border-radius:8px 0 0 8px}
  .bar.ongoing{border-style:dashed}
  .bar .arw{position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:0;height:0;
    border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:9px solid var(--barcap)}
  .bar .inner{overflow:hidden;min-width:0;width:100%;padding-left:3px;display:flex;flex-direction:column;gap:2px}
  .bar .l1{font-size:11.5px;font-weight:640;line-height:1.2;display:flex;flex-wrap:wrap;align-items:center;gap:3px 5px}
  .bar .l1 .p{font-family:var(--mono);color:var(--barcap)}
  .bar .dishchip{font-family:var(--mono);font-size:9.5px;padding:0 5px;border-radius:4px;border:1px solid var(--barln);color:var(--ink-soft);font-weight:600;background:var(--chipbg)}
  .bar .l2{font-family:var(--mono);font-size:10px;line-height:1.28;color:var(--ink-soft);font-variant-numeric:tabular-nums;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .bar .uses{display:flex;gap:3px;flex-wrap:wrap;overflow:hidden}
  .bar .uchip{font-size:9px;font-weight:700;letter-spacing:.02em;padding:1px 5px;border-radius:5px;color:#fff;white-space:nowrap;flex:none}
  .uop{border:1.5px solid var(--border-strong);border-radius:9px;padding:8px 11px;cursor:pointer;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;background:var(--surface-2);color:var(--ink);transition:.12s}
  .uop:hover{border-color:var(--ink-faint)}
  .uop .k{width:11px;height:11px;border-radius:50%;flex:none}
  .uop.sel{border-color:var(--uc);background:color-mix(in srgb,var(--uc) 15%,transparent);color:var(--uc)}
  .usewrap{display:flex;flex-wrap:wrap;gap:8px}

  :root{--chipbg:rgba(255,255,255,.5)}
  :root[data-theme="dark"]{--chipbg:rgba(255,255,255,.08)}
  @media (prefers-color-scheme:dark){:root{--chipbg:rgba(255,255,255,.08)}}
  :root[data-theme="light"]{--chipbg:rgba(255,255,255,.5)}

  .f-passage{--barbg:var(--f-passage-bg);--barln:color-mix(in srgb,var(--f-passage) 34%,transparent);--barcap:var(--f-passage)}
  .f-freeze{--barbg:var(--f-freeze-bg);--barln:color-mix(in srgb,var(--f-freeze) 34%,transparent);--barcap:var(--f-freeze)}
  .f-isogen{--barbg:var(--f-isogen-bg);--barln:color-mix(in srgb,var(--f-isogen) 34%,transparent);--barcap:var(--f-isogen)}
  .f-other{--barbg:var(--f-other-bg);--barln:color-mix(in srgb,var(--f-other) 34%,transparent);--barcap:var(--f-other)}

  .dhead{position:absolute;top:0;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:5px}
  .dhead .dnum{font-family:var(--mono);font-size:11px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .dhead.we .dnum{color:var(--ink-faint)}
  .dhead .dow{font-size:8.5px;color:var(--ink-faint);letter-spacing:.02em}
  .dhead.sun .dnum,.dhead.sun .dow{color:#d0567b}
  .mstrip{position:absolute;top:4px;font-size:11px;font-weight:640;letter-spacing:.02em;color:var(--ink);padding-left:6px;border-left:2px solid var(--border-strong)}

  .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;color:var(--ink-soft);padding:30px}
  .empty h3{margin:0;color:var(--ink);font-weight:620;font-size:16px}
  .empty p{margin:0;font-size:13px;max-width:340px;line-height:1.5}

  .scrim{position:fixed;inset:0;background:rgba(15,20,28,.5);backdrop-filter:blur(2px);
    display:none;align-items:flex-start;justify-content:center;z-index:100;padding:32px 16px;overflow:auto}
  .scrim.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    width:min(580px,100%);box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden}
  .modal header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
  .modal header h2{margin:0;font-size:15.5px;font-weight:640}
  .modal header .x{border:0;background:transparent;color:var(--ink-soft);font-size:22px;line-height:1;cursor:pointer;padding:4px 6px;border-radius:7px}
  .modal header .x:hover{background:var(--surface-2);color:var(--ink)}
  .form{padding:18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:13px 14px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.full{grid-column:1 / -1}
  .field label{font-size:11px;font-weight:620;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-soft)}
  .field input,.field select{font-family:var(--sans);font-size:13.5px;color:var(--ink);
    background:var(--surface-2);border:1px solid var(--border-strong);border-radius:9px;padding:9px 11px;width:100%}
  .field input:focus,.field select:focus{outline:2px solid var(--accent);outline-offset:0;border-color:transparent}
  .field .hint{font-size:10.5px;color:var(--ink-faint)}
  .field input[type=date]{font-family:var(--mono)}
  .withunit{display:flex;align-items:stretch;gap:0}
  .withunit input{border-radius:9px 0 0 9px}
  .withunit .unit{display:inline-flex;align-items:center;padding:0 11px;background:var(--surface-3);border:1px solid var(--border-strong);border-left:0;border-radius:0 9px 9px 0;font-size:12.5px;color:var(--ink-soft);white-space:nowrap}
  .combo{display:flex;align-items:stretch}
  .combo>input,.combo>select{border-radius:0;border-right:0}
  .combo>input:first-child,.combo>.unit:first-child{border-radius:9px 0 0 9px}
  .combo .unit{display:inline-flex;align-items:center;padding:0 10px;background:var(--surface-3);border:1px solid var(--border-strong);border-right:0;font-size:12.5px;color:var(--ink-soft);white-space:nowrap}
  .combo>*:last-child{border-right:1px solid var(--border-strong);border-radius:0 9px 9px 0}
  .combo>input{min-width:0}
  .chk{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--ink);padding:6px 0}
  .chk input{width:17px;height:17px;accent-color:var(--accent);margin:0}

  .pick{display:grid;gap:8px}
  .pick.g4{grid-template-columns:repeat(4,1fr)}
  .pick.g2{grid-template-columns:repeat(2,1fr)}
  .pick .op{border:1.5px solid var(--border-strong);border-radius:10px;padding:9px 6px;cursor:pointer;text-align:center;font-size:12px;font-weight:600;background:var(--surface-2);transition:.12s;color:var(--ink)}
  .pick .op .k{display:block;width:10px;height:10px;border-radius:50%;margin:0 auto 5px}
  .pick .op.sel{border-color:var(--opc);background:var(--opbg);color:var(--opc)}

  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12px;padding:5px 10px;border-radius:20px;border:1.5px solid var(--border-strong);background:var(--surface-2);color:var(--ink-soft);cursor:pointer;transition:.12s;white-space:nowrap}
  .chip:hover{border-color:var(--ink-faint)}
  .chip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .chips .none{font-size:11.5px;color:var(--ink-faint);padding:4px 0}

  .modal footer{display:flex;gap:10px;align-items:center;padding:15px 20px;border-top:1px solid var(--border);background:var(--surface-2)}
  .modal footer .spc{flex:1}
  .btn.danger{color:#fff;background:#d5405a;border-color:transparent}
  .btn.danger:hover{filter:brightness(1.05);background:#d5405a}

  /* settings */
  .setbody{padding:16px 20px;display:flex;flex-direction:column;gap:18px;max-height:66vh;overflow:auto}
  .setsec h3{margin:0 0 8px;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);font-weight:660}
  .setlist{display:flex;flex-direction:column;gap:6px;margin-bottom:9px}
  .setitem{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:7px 10px;font-size:13px}
  .setitem span{flex:1;word-break:break-word}
  .setitem button{border:0;background:transparent;color:var(--ink-faint);cursor:pointer;font-size:17px;line-height:1;padding:2px 5px;border-radius:6px}
  .setitem button:hover{background:var(--surface-3);color:#d5405a}
  .setadd{display:flex;gap:8px}
  .setadd input{flex:1;font-family:var(--sans);font-size:13px;color:var(--ink);background:var(--surface-2);border:1px solid var(--border-strong);border-radius:9px;padding:8px 11px}
  .setadd input:focus{outline:2px solid var(--accent);border-color:transparent}
  .setempty{font-size:12px;color:var(--ink-faint);padding:2px 2px 8px}

  @media (max-width:560px){.form{grid-template-columns:1fr}.pick.g4{grid-template-columns:repeat(2,1fr)}}
  .file-hidden{display:none}
  .hidden{display:none!important}
</style>

<div class="wrap">
  <div class="top">
    <div class="title">
      <h1>細胞パッセージ管理</h1>
      <div class="sub">播種 → 回収予定を時間軸に並べ、<b>継代・ISOGEN回収・凍結</b>を見わたす培養タイムライン</div>
    </div>
    <div class="spacer"></div>
    <div class="toolbar">
      <div class="zoom" title="表示スケール">
        <button id="zoomOut" aria-label="縮小">−</button>
        <span id="zoomLabel">1日 40px</span>
        <button id="zoomIn" aria-label="拡大">＋</button>
      </div>
      <button class="btn ghost" id="themeBtn" title="ライト / ダーク切り替え">

        設定

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v11m0 0-4-4m4 4 4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
        Excel書出

      <button class="btn ghost" id="importBtn" title="Excel(CSV) / JSON を1回だけ読み込み（接続はしない）">読込</button>

<script>
(function(){
  "use strict";
  var KEY='cellPassageDB.v3';
  var DAY=86400000;
  var DISH={
    d100:{label:'100 mm dish',short:'100mm',well:false},
    w6:{label:'6 well plate',short:'6well',well:true},
    w12:{label:'12 well plate',short:'12well',well:true},
    w24:{label:'24 well plate',short:'24well',well:true},
    w96:{label:'96 well plate',short:'96well',well:true}
  };
  var DISH_ORDER=['d100','w6','w12','w24','w96'];
  var USE_BUILTIN=[
    {label:'継代',short:'継代',color:'#e0397a'},
    {label:'ISOGEN回収',short:'ISOGEN',color:'#7a58d6'},
    {label:'DNA抽出',short:'DNA',color:'#2fa46b'},
    {label:'凍結ストック',short:'❄凍結',color:'#1f9fc0'},
    {label:'その他/回収',short:'回収',color:'#c9821c'}
  ];
  var USE_PALETTE=['#4f83d6','#c8578f','#3fa3a8','#9a7b3b','#8a6ad8','#4a9d63','#c96a3a','#5f8fae'];
  function allUses(){
    var arr=USE_BUILTIN.slice();
    (state.settings.uses||[]).forEach(function(l,i){arr.push({label:l,short:l,color:USE_PALETTE[i%USE_PALETTE.length]});});
    return arr;
  }
  function useMeta(label){var u=allUses().filter(function(x){return x.label===label;})[0];return u||{label:label,short:label,color:'#8b97a6'};}
  function recUses(r){return Array.isArray(r.uses)?r.uses:(r.uses?[r.uses]:[]);}
  function primColor(r){var us=recUses(r);return us.length?useMeta(us[0]).color:'#8b97a6';}
  var EXP_ORDER=[3,4,5,6,7,8];
  var DEFAULT_EXP=5;

  function defaultSettings(){
    return {
      cells:[],
      media:['RPMI1640 CM (10% FBS, Glutamax, P/S)'],
      reagents:['TGF-β 5 ng/mL','Puromycin 1 µg/mL','Doxycycline 1 µg/mL'],
      genes:[],
      uses:[]
    };
  }

  var state={records:[],settings:defaultSettings()};
  var px=40;
  var LABELW=210, HH=54, ROWH=84, GROUPH=32;

  function uid(){return 'r'+Math.random().toString(36).slice(2,9)+(state.records.length);}
  function normalizeState(){
    if(!state.records)state.records=[];
    if(!state.settings)state.settings=defaultSettings();
    ['cells','media','reagents','genes','uses'].forEach(function(k){if(!Array.isArray(state.settings[k]))state.settings[k]=defaultSettings()[k];});
    var FATEMAP={passage:'継代',isogen:'ISOGEN回収',freeze:'凍結ストック',dna:'DNA抽出',other:'その他/回収'};
    state.records.forEach(function(r){
      if(r.seedMode===undefined){applyConc(r,r.conc||'');}
      if(r.concExp===undefined)r.concExp=DEFAULT_EXP;
      if(r.dilution===undefined)r.dilution='';
      if('conc' in r)delete r.conc;
      if(!Array.isArray(r.uses)){r.uses=r.fate?[FATEMAP[r.fate]||r.fate]:[];}
      if('fate' in r)delete r.fate;
    });
    mergeSettingsFromRecords();
  }
  function load(){
    try{var raw=localStorage.getItem(KEY);if(raw){state=JSON.parse(raw);}}catch(e){state={};}
    if(!state.records)state.records=[];
    if(!state.settings)state.settings=defaultSettings();
    if(!state.records.length)state.records=sampleData();
    normalizeState();
  }
  function persistLocal(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
  function save(){persistLocal();if(fileHandle){setFileStatus('saving');flushFile();}}
  // データを外部JSONの内容で置き換える（ファイルを開いた/JSON読込時）
  function applyLoadedState(obj){
    var recs=Array.isArray(obj)?obj:(obj&&obj.records);
    if(!Array.isArray(recs))throw new Error('bad json');
    state={records:recs,settings:(obj&&obj.settings)?obj.settings:state.settings};
    normalizeState();persistLocal();
    renderLegend();render();
    if(scrim.classList.contains('open'))fillFormSelects();
  }

  function d2t(s){return new Date(s+'T00:00:00').getTime();}
  function t2s(t){var d=new Date(t);return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
  function pad2(n){return ('0'+n).slice(-2);}
  function todayStr(){return t2s(Date.now());}
  function addDaysStr(s,n){return t2s(d2t(s)+n*DAY);}
  var DOW=['日','月','火','水','木','金','土'];

  function sampleData(){
    var T=todayStr();
    function rel(n){return addDaysStr(T,n);}
    var med='RPMI1640 CM (10% FBS, Glutamax, P/S)';
    function R(o){o.medium=o.medium||med;o.genotype=o.genotype||'WT';o.gene=o.gene||'';o.perWell=!!o.perWell;o.reagents=o.reagents||'';o.note=o.note||'';o.seedMode=o.seedMode||'conc';o.concMant=(o.concMant===0||o.concMant)?o.concMant:'';o.concExp=o.concExp||DEFAULT_EXP;o.dilution=o.dilution||'';o.uses=o.uses||[];return o;}
    return [
      R({id:'s1',cell:'HeLa',dish:'d100',passage:5,seed:rel(-14),harvest:rel(-10),concMant:1.0,concExp:6,vol:'10',uses:['継代']}),
      R({id:'s2',cell:'HeLa',dish:'d100',passage:6,seed:rel(-10),harvest:rel(-6),seedMode:'dilution',dilution:4,vol:'10',uses:['継代'],note:'希釈継代'}),
      R({id:'s3',cell:'HeLa',dish:'w6',passage:6,seed:rel(-10),harvest:rel(-7),concMant:3.0,concExp:5,vol:'2',perWell:true,reagents:'TGF-β 5 ng/mL',uses:['ISOGEN回収','DNA抽出'],note:'RNA/DNA回収'}),
      R({id:'s4',cell:'HeLa',dish:'d100',passage:7,seed:rel(-6),harvest:rel(-2),concMant:1.0,concExp:6,vol:'10',uses:['凍結ストック'],note:'2 vials'}),
      R({id:'s5',cell:'HeLa',dish:'w12',passage:7,seed:rel(-6),harvest:rel(0),concMant:1.5,concExp:5,vol:'1',perWell:true,genotype:'KO',gene:'GeneX',reagents:'Puromycin 1 µg/mL',uses:['継代','ISOGEN回収','DNA抽出'],note:'本日回収'}),
      R({id:'s6',cell:'HeLa',dish:'d100',passage:8,seed:rel(0),harvest:rel(5),concMant:1.0,concExp:6,vol:'10',genotype:'KO',gene:'GeneX',uses:['継代']})
    ];
  }

  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function effHarvest(r){return r.harvest?r.harvest:addDaysStr(r.seed,3);}
  function passLabel(r){return (r.passage||r.passage===0)?('P'+r.passage):'—';}
  function genoLabel(r){return r.genotype==='KO'?('KO '+(r.gene||'?')):'WT';}
  function mediumShort(m){return m?(''+m).split('(')[0].trim():'';}
  function volText(r){if(r.vol==='' || r.vol==null)return '';return r.vol+' mL'+(r.perWell?'/well':'');}
  function concDisplay(r){
    if(r.seedMode==='dilution')return '希釈 1:'+((r.dilution||r.dilution===0)?r.dilution:'?');
    if(r.concMant===''||r.concMant==null)return '';
    return r.concMant+'×10^'+(r.concExp||DEFAULT_EXP)+' cells'+(r.perWell?'/well':'/mL');
  }
  function applyConc(rec,str){
    str=(''+str).trim();
    if(!str){rec.seedMode='conc';rec.concMant='';rec.concExp=DEFAULT_EXP;rec.dilution='';return;}
    var isDil=/希釈|dilut/i.test(str)||(/[:∶\/]/.test(str)&&!/10\^|×|x\s*10/i.test(str));
    if(isDil){
      rec.seedMode='dilution';rec.concMant='';rec.concExp=DEFAULT_EXP;
      var dm=str.match(/1\s*[:∶\/]\s*([\d.]+)/);
      var x;
      if(dm)x=parseFloat(dm[1]);
      else{var nm=str.replace(/希釈|dilut(ion)?/ig,'').match(/([\d.]+)/);x=nm?parseFloat(nm[1]):'';}
      rec.dilution=(x===''||isNaN(x))?'':x;return;
    }
    var m=str.match(/([\d.]+)\s*[×xX*]\s*10\^?\s*(\d+)/);
    if(m){rec.seedMode='conc';rec.concMant=parseFloat(m[1]);rec.concExp=parseInt(m[2],10);rec.dilution='';return;}
    var n=str.match(/^([\d.]+)/);
    if(n){rec.seedMode='conc';rec.concMant=parseFloat(n[1]);rec.concExp=DEFAULT_EXP;rec.dilution='';return;}
    rec.seedMode='conc';rec.concMant='';rec.concExp=DEFAULT_EXP;rec.dilution='';
  }

  function mergeSettingsFromRecords(){
    state.records.forEach(function(r){
      if(r.cell && state.settings.cells.indexOf(r.cell)<0)state.settings.cells.push(r.cell);
      if(r.medium && state.settings.media.indexOf(r.medium)<0)state.settings.media.push(r.medium);
      if(r.genotype==='KO' && r.gene && state.settings.genes.indexOf(r.gene)<0)state.settings.genes.push(r.gene);
      reagTokens(r.reagents).forEach(function(tk){if(state.settings.reagents.indexOf(tk)<0)state.settings.reagents.push(tk);});
      recUses(r).forEach(function(u){var builtin=USE_BUILTIN.some(function(b){return b.label===u;});if(!builtin && state.settings.uses.indexOf(u)<0)state.settings.uses.push(u);});
    });
  }
  function reagTokens(s){return (s||'').split(',').map(function(x){return x.trim();}).filter(Boolean);}

  // ---------- layout ----------
  function computeLayout(){
    var recs=state.records.slice();
    if(!recs.length)return null;
    var idx={};state.records.forEach(function(r,i){idx[r.id]=i;});
    var minT=Infinity,maxT=-Infinity;
    recs.forEach(function(r){var s=d2t(r.seed),e=d2t(effHarvest(r));if(s<minT)minT=s;if(e>maxT)maxT=e;});
    var tT=d2t(todayStr());
    if(tT<minT)minT=tT; if(tT>maxT)maxT=tT;
    var originT=minT-2*DAY, endT=maxT+3*DAY;
    var totalDays=Math.round((endT-originT)/DAY)+1;
    function xOf(s){return Math.round((d2t(s)-originT)/DAY*px);}

    var groups={},order=[];
    recs.forEach(function(r){var key=(r.cell||'').trim();if(!groups[key]){groups[key]=[];order.push(key);}groups[key].push(r);});
    order.sort(function(a,b){
      var ma=Math.min.apply(null,groups[a].map(function(r){return d2t(r.seed);}));
      var mb=Math.min.apply(null,groups[b].map(function(r){return d2t(r.seed);}));
      if(ma!==mb)return ma-mb;
      return a.localeCompare(b);
    });
    var rows=[];
    order.forEach(function(cell){
      var arr=groups[cell].slice().sort(function(a,b){
        var d=d2t(a.seed)-d2t(b.seed);if(d)return d;
        var p=(a.passage||0)-(b.passage||0);if(p)return p;
        return idx[a.id]-idx[b.id];
      });
      rows.push({kind:'group',cell:cell,count:arr.length});
      arr.forEach(function(r){rows.push({kind:'rec',rec:r});});
    });
    var y=0;
    rows.forEach(function(row){
      row.y=y; row.h=(row.kind==='group')?GROUPH:ROWH;
      if(row.kind==='rec'){
        var r=row.rec, x0=xOf(r.seed), x1=xOf(effHarvest(r));
        if(x1-x0<64)x1=x0+64;
        row._x0=x0; row._x1=x1;
      }
      y+=row.h;
    });
    return {rows:rows,bodyH:y,timeW:totalDays*px,totalDays:totalDays,originT:originT,px:px,xOf:xOf};
  }

  function render(){
    renderToday();
    var L=computeLayout();
    var grid=document.getElementById('grid');
    document.documentElement.style.setProperty('--labelw',LABELW+'px');
    grid.innerHTML='';
    grid.appendChild(makeCorner());
    if(!L){
      var th=document.createElement('div');th.className='thead';th.style.minWidth='600px';th.style.height=HH+'px';grid.appendChild(th);
      var lb=document.createElement('div');lb.className='labels';lb.style.minHeight='320px';grid.appendChild(lb);
      var cv=document.createElement('div');cv.className='canvas';cv.style.minHeight='320px';cv.style.minWidth='600px';
      cv.innerHTML='<div class="empty"><h3>培養がまだありません</h3><p>「培養を追加」から播種を登録してください。</p><button class="btn primary" id="emptyAdd">最初の培養を追加</button></div>';
      grid.appendChild(cv);
      document.getElementById('emptyAdd').onclick=function(){openForm(null);};
      return;
    }
    var thead=document.createElement('div');
    thead.className='thead';thead.style.width=L.timeW+'px';thead.style.height=HH+'px';thead.style.gridColumn='2';
    thead.innerHTML=buildHeader(L);
    grid.appendChild(thead);

    var labels=document.createElement('div');labels.className='labels';
    L.rows.forEach(function(row){labels.appendChild(makeRowLabel(row));});
    grid.appendChild(labels);

    var canvas=document.createElement('div');canvas.className='canvas';
    canvas.style.width=L.timeW+'px';canvas.style.height=L.bodyH+'px';
    canvas.innerHTML=buildBG(L);
    L.rows.forEach(function(row){if(row.kind==='rec')canvas.appendChild(makeBar(row));});
    grid.appendChild(canvas);

    var board=document.getElementById('board');
    var todayX=L.xOf(todayStr());
    board.scrollLeft=Math.max(0,todayX-board.clientWidth*0.55);
  }

  function makeCorner(){var c=document.createElement('div');c.className='corner';c.style.height=HH+'px';c.textContent='細胞 / Passage';return c;}

  function buildHeader(L){
    var html='',seen={};
    for(var d=0;d<L.totalDays;d++){
      var t=L.originT+d*DAY,dt=new Date(t),x=d*L.px,dow=dt.getDay();
      var cls='dhead'+(dow===0||dow===6?' we':'')+(dow===0?' sun':'');

      var mk=dt.getFullYear()+'-'+dt.getMonth();
      if(!seen[mk]){seen[mk]=1;html+='<div class="mstrip" style="left:'+x+'px">'+(dt.getMonth()+1)+'月<span style="color:var(--ink-faint);font-weight:500"> '+dt.getFullYear()+'</span></div>';}

  function buildBG(L){
    var W=L.timeW,H=L.bodyH;
    var s='<svg width="'+W+'" height="'+H+'" style="position:absolute;left:0;top:0;z-index:0" xmlns="http://www.w3.org/2000/svg">';
    for(var d=0;d<L.totalDays;d++){
      var t=L.originT+d*DAY,dt=new Date(t),x=d*L.px,dow=dt.getDay();
      if(dow===0||dow===6)s+='<rect x="'+x+'" y="0" width="'+L.px+'" height="'+H+'" fill="var(--weekend)"/>';
      var strong=(dt.getDate()===1);
      s+='<line x1="'+x+'" y1="0" x2="'+x+'" y2="'+H+'" stroke="var(--border)" stroke-width="'+(strong?1.4:1)+'" '+(strong?'':'opacity="0.55"')+'/>';
    }
    var tx=L.xOf(todayStr());
    s+='<line x1="'+tx+'" y1="0" x2="'+tx+'" y2="'+H+'" stroke="var(--today)" stroke-width="2" stroke-dasharray="3 3"/>';
    return s+'</svg>';

  function downloadBlob(text,name,mime){
    var blob=new Blob([text],{type:mime}),url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();

  function dishFromText(v){v=(''+v).trim();for(var k in DISH){if(k===v||DISH[k].label===v||DISH[k].short===v)return k;}var lc=v.toLowerCase().replace(/\s/g,'');for(var k2 in DISH){if(DISH[k2].short.toLowerCase()===lc)return k2;}return 'd100';}
  function boolFromText(v){return /^(○|◯|1|true|yes|y|はい|✓|checked|well)$/i.test((''+v).trim());}
  function genoFromText(v){return /ko|ノックアウト/i.test((''+v).trim())?'KO':'WT';}
  function normDate(v){
    v=(''+v).trim();if(!v)return '';var m;
    if((m=v.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/)))return m[1]+'-'+pad2(m[2])+'-'+pad2(m[3]);
    if(/^\d+(\.\d+)?$/.test(v)){var d=new Date(Date.UTC(1899,11,30)+parseFloat(v)*DAY);return d.getUTCFullYear()+'-'+pad2(d.getUTCMonth()+1)+'-'+pad2(d.getUTCDate());}
    var t=Date.parse(v);if(!isNaN(t)){var d2=new Date(t);return d2.getFullYear()+'-'+pad2(d2.getMonth()+1)+'-'+pad2(d2.getDate());}
    return v;
  }
  var CSV_COLS=[
    {h:'ID',get:function(r){return r.id;},set:function(r,v){if(v)r.id=v;}},
    {h:'細胞名',get:function(r){return r.cell;},set:function(r,v){r.cell=v;}},
    {h:'ディッシュ',get:function(r){return (DISH[r.dish]||{}).label||r.dish;},set:function(r,v){r.dish=dishFromText(v);}},
    {h:'Passage',get:function(r){return (r.passage||r.passage===0)?r.passage:'';},set:function(r,v){v=(''+v).trim();r.passage=(v===''?'':parseInt(v,10));}},
    {h:'播種日',get:function(r){return r.seed;},set:function(r,v){r.seed=normDate(v);}},
    {h:'回収予定日',get:function(r){return r.harvest;},set:function(r,v){r.harvest=normDate(v);}},
    {h:'遺伝子型',get:function(r){return r.genotype||'WT';},set:function(r,v){r.genotype=genoFromText(v);}},
    {h:'遺伝子',get:function(r){return r.gene||'';},set:function(r,v){r.gene=(''+v).trim();}},
    {h:'培地',get:function(r){return r.medium||'';},set:function(r,v){r.medium=(''+v).trim();}},
    {h:'播種濃度',get:function(r){return concDisplay(r);},set:function(r,v){applyConc(r,v);}},
    {h:'ボリューム(mL)',get:function(r){return (r.vol===0||r.vol)?r.vol:'';},set:function(r,v){v=(''+v).trim();r.vol=(v===''?'':parseFloat(v));}},
    {h:'ウェルあたり',get:function(r){return r.perWell?'○':'';},set:function(r,v){r.perWell=boolFromText(v);}},
    {h:'添加薬品',get:function(r){return r.reagents;},set:function(r,v){r.reagents=v;}},
    {h:'用途',get:function(r){return recUses(r).join(' / ');},set:function(r,v){r.uses=(''+v).split(/[\/,、|]/).map(function(s){return s.trim();}).filter(Boolean);}},
    {h:'メモ',get:function(r){return r.note;},set:function(r,v){r.note=v;}}
  ];
  function csvCell(v){v=(v==null?'':''+v);if(/[",\r\n]/.test(v))return '"'+v.replace(/"/g,'""')+'"';return v;}
  function exportCSV(){
    var lines=[CSV_COLS.map(function(c){return csvCell(c.h);}).join(',')];
    state.records.forEach(function(r){lines.push(CSV_COLS.map(function(c){return csvCell(c.get(r));}).join(','));});
    downloadBlob('﻿'+lines.join('\r\n'),'cell-passages-'+todayStr()+'.csv','text/csv;charset=utf-8');
  }
  function parseCSV(text){
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    var rows=[],row=[],cur='',inq=false;
    for(var i=0;i<text.length;i++){var ch=text[i];
      if(inq){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else inq=false;}else cur+=ch;}
      else{if(ch==='"')inq=true;else if(ch===','){row.push(cur);cur='';}else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(ch==='\r'){}else cur+=ch;}
    }
    if(cur!==''||row.length){row.push(cur);rows.push(row);}
    return rows.filter(function(r){return r.length>1||(r[0]&&r[0].trim()!=='');});
  }
  function importCSV(text){
    var rows=parseCSV(text);if(rows.length<2)throw new Error('rows');
    var header=rows[0].map(function(s){return (''+s).trim();});
    var colMap=header.map(function(h){for(var i=0;i<CSV_COLS.length;i++)if(CSV_COLS[i].h===h)return CSV_COLS[i];return null;});
    var recs=[];
    for(var r=1;r<rows.length;r++){
      var cells=rows[r];
      var rec={id:'',cell:'',dish:'d100',passage:'',seed:'',harvest:'',genotype:'WT',gene:'',medium:'',seedMode:'conc',concMant:'',concExp:DEFAULT_EXP,dilution:'',vol:'',perWell:false,reagents:'',uses:[],note:''};
      for(var c=0;c<cells.length;c++){var col=colMap[c];if(col&&col.set)col.set(rec,cells[c]);}
      if(!rec.cell&&!rec.seed)continue;
      if(!rec.id)rec.id=uid();
      recs.push(rec);
    }
    if(!recs.length)throw new Error('empty');
    state.records=recs;mergeSettingsFromRecords();save();renderLegend();render();
  }
  document.getElementById('fileInput').addEventListener('change',function(e){
    var file=e.target.files[0];if(!file)return;var rd=new FileReader();
    rd.onload=function(){
      var txt=''+rd.result,name=(file.name||'').toLowerCase();
      var looksJSON=name.slice(-5)==='.json'||/^\s*[\{\[]/.test(txt);
      try{
        if(looksJSON){applyLoadedState(JSON.parse(txt));}
        else importCSV(txt);
      }catch(err){alert('読み込めませんでした。\nExcelで編集した場合は「CSV UTF-8」形式で保存し、列見出しの行を残してください。');}
    };
    rd.readAsText(file);e.target.value='';
  });

  // ---------- JSON ファイル接続（File System Access API・毎回そのJSONへ自動保存）----------
  var fileHandle=null, connectedName='', writing=false, pendingWrite=false;
  var supportsFS=('showSaveFilePicker' in window)&&('showOpenFilePicker' in window);
  function setFileStatus(kind){
    var el=document.getElementById('fileStatus'); if(!el)return;
    el.onclick=null; el.style.cursor='default'; el.classList.remove('act');
    if(kind==='reconnect'){
      el.innerHTML='<span class="dotst warn"></span>'+esc(connectedName)+' <b>接続</b>';
      el.classList.add('act'); el.style.cursor='pointer'; el.onclick=reconnect; return;
    }
    if(!fileHandle){
      el.innerHTML='<span class="dotst off"></span>未接続 <span class="sub">(ブラウザ内保存)</span>'; return;
    }
    el.classList.add('act');
    var map={saving:['dotst warn','保存中…'],saved:['dotst ok','自動保存'],error:['dotst err','保存失敗']};
    var m=map[kind]||map.saved;
    el.innerHTML='<span class="'+m[0]+'"></span>'+esc(connectedName)+' <span class="sub">· '+m[1]+'</span>';
  }
  function flushFile(){
    if(!fileHandle)return;
    if(writing){pendingWrite=true;return;}
    writing=true;
    fileHandle.createWritable().then(function(w){
      return w.write(JSON.stringify(state,null,2)).then(function(){return w.close();});
    }).then(function(){setFileStatus('saved');}).catch(function(){setFileStatus('error');})
    .then(function(){writing=false;if(pendingWrite){pendingWrite=false;flushFile();}});
  }
  function openJsonFile(){
    if(!supportsFS){document.getElementById('fileInput').click();return;}
    window.showOpenFilePicker({types:[{description:'JSON',accept:{'application/json':['.json']}}]}).then(function(hs){
      var h=hs[0];
      return h.getFile().then(function(f){return f.text();}).then(function(txt){
        applyLoadedState(JSON.parse(txt));
        fileHandle=h; connectedName=h.name; setFileStatus('saved');
        return idbSet('handle',h);
      });
    }).catch(function(e){if(e&&e.name==='AbortError')return; document.getElementById('fileInput').click();});
  }
  function saveAsJsonFile(){
    if(!supportsFS){exportJSON();return;}
    window.showSaveFilePicker({suggestedName:'cell-passages.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]}).then(function(h){
      fileHandle=h; connectedName=h.name; setFileStatus('saving');
      return idbSet('handle',h).then(function(){flushFile();});
    }).catch(function(e){if(e&&e.name==='AbortError')return;
      alert('この環境では自動保存先を設定できませんでした（ローカルの file:// では制限される場合があります）。\nかわりにJSONを書き出します。GitHub Pages 等の https で開くと自動保存が使えます。');
      exportJSON();});
  }
  function reconnect(){
    if(!fileHandle)return;
    fileHandle.requestPermission({mode:'readwrite'}).then(function(p){
      if(p!=='granted')return;
      return fileHandle.getFile().then(function(f){return f.text();}).then(function(txt){
        applyLoadedState(JSON.parse(txt)); setFileStatus('saved');
      });
    }).catch(function(){setFileStatus('reconnect');});
  }
  function restoreHandle(){
    if(!supportsFS)return;
    idbGet('handle').then(function(h){
      if(!h)return;
      fileHandle=h; connectedName=h.name||'保存先';
      return h.queryPermission({mode:'readwrite'}).then(function(perm){
        if(perm==='granted'){
          return h.getFile().then(function(f){return f.text();}).then(function(txt){applyLoadedState(JSON.parse(txt));setFileStatus('saved');});
        }else{ setFileStatus('reconnect'); }
      });
    }).catch(function(){fileHandle=null;setFileStatus();});
  }
  function idbOpen(){return new Promise(function(res,rej){var o=indexedDB.open('cpm-store',1);o.onupgradeneeded=function(){o.result.createObjectStore('kv');};o.onsuccess=function(){res(o.result);};o.onerror=function(){rej(o.error);};});}
  function idbSet(k,v){return idbOpen().then(function(db){return new Promise(function(res,rej){var tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(v,k);tx.oncomplete=function(){res();};tx.onerror=function(){rej(tx.error);};});});}
  function idbGet(k){return idbOpen().then(function(db){return new Promise(function(res,rej){var tx=db.transaction('kv','readonly');var rq=tx.objectStore('kv').get(k);rq.onsuccess=function(){res(rq.result);};rq.onerror=function(){rej(rq.error);};});});}
  function disconnectFile(){fileHandle=null;connectedName='';idbSet('handle',null);setFileStatus();}

  // ---------- theme / zoom ----------
  function toggleTheme(){var cur=document.documentElement.getAttribute('data-theme');var isDark=cur?cur==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',isDark?'light':'dark');}
  function setZoom(delta){px=Math.max(18,Math.min(84,px+delta));document.getElementById('zoomLabel').textContent='1日 '+px+'px';render();}

  // ---------- wire ----------
  document.getElementById('addBtn').onclick=function(){openForm(null);};
  document.getElementById('mClose').onclick=closeForm;
  document.getElementById('mCancel').onclick=closeForm;
  document.getElementById('mSave').onclick=saveForm;
  document.getElementById('mDelete').onclick=deleteRec;
  document.getElementById('mDup').onclick=dupRec;
  document.getElementById('setBtn').onclick=openSettings;
  document.getElementById('setClose').onclick=closeSettings;
  document.getElementById('setDone').onclick=closeSettings;
  document.getElementById('exportBtn').onclick=exportCSV;
  document.getElementById('openBtn').onclick=openJsonFile;
  document.getElementById('saveAsBtn').onclick=saveAsJsonFile;
  document.getElementById('importBtn').onclick=function(){document.getElementById('fileInput').click();};
  document.getElementById('themeBtn').onclick=toggleTheme;
  document.getElementById('zoomIn').onclick=function(){setZoom(8);};
  document.getElementById('zoomOut').onclick=function(){setZoom(-8);};
  scrim.addEventListener('click',function(e){if(e.target===scrim)closeForm();});
  setScrim.addEventListener('click',function(e){if(e.target===setScrim)closeSettings();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'){if(scrim.classList.contains('open'))closeForm();else if(setScrim.classList.contains('open'))closeSettings();}});

  // ---------- init ----------
  load();
  renderLegend();
  render();
  setFileStatus();
  restoreHandle();
})();
</script>
